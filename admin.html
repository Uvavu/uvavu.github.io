<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooling Stores Control Dashboard & Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 flex flex-col items-center">

    <div id="loginGate" class="w-full max-w-sm bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-6 mt-12 space-y-4">
        <h2 class="text-xl font-bold text-center text-blue-400">🔒 Admin & Dashboard Gatehouse</h2>
        <div class="space-y-3">
            <input type="password" id="adminPassword" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white text-center" placeholder="Enter Depot Admin Password">
            <button onclick="checkAdminAuth()" class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-2.5 rounded-lg transition">Login</button>
        </div>
    </div>

    <div id="adminDashboard" class="hidden w-full max-w-5xl bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-6 space-y-6">
        
        <div class="flex justify-between items-center border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-xl font-bold text-blue-400">📊 Depot Tooling Management Dashboard</h1>
                <p class="text-xs text-slate-400 mt-0.5">Live Track Status, Locations, and Calibration Lifecycle Controls</p>
            </div>
            <button onclick="logoutAdmin()" class="text-xs text-red-400 hover:underline">Secure Log Out</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 space-y-4 h-fit">
                <h3 class="text-sm font-bold text-slate-300" id="formHeader">Add / Edit Inventory Item</h3>
                <div class="space-y-3 text-xs">
                    <div>
                        <label class="block text-slate-400 mb-1">Calibration ID (Primary Key)</label>
                        <input type="text" id="toolId" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. TORQ-001">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">Tool Description Name</label>
                        <input type="text" id="toolName" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. Norbar Torque Wrench">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">Calibration Date (DD/MM/YYYY)</label>
                        <input type="text" id="calDate" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. 03/06/2026">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">Calibration Due (DD/MM/YYYY)</label>
                        <input type="text" id="calDue" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. 03/06/2027">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">Storage Bin Allocation</label>
                        <input type="text" id="storageBin" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. Locker B, Shelf 3">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">Circulation Lifecycle Status</label>
                        <select id="toolStatus" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none">
                            <option value="ACTIVE">ACTIVE (Available in Scope)</option>
                            <option value="OUT_FOR_CALIBRATION">🔴 AWAY FOR CALIBRATION</option>
                            <option value="RETIRED">⚠️ DECOMMISSIONED / BROKEN</option>
                        </select>
                    </div>
                </div>
                <div class="pt-2 flex flex-col gap-2">
                    <button onclick="saveToolToInventory()" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-2 rounded text-xs text-white transition shadow">
                        Save Asset Record
                    </button>
                    <button onclick="resetForm()" class="w-full bg-slate-800 hover:bg-slate-700 font-medium py-1.5 rounded text-[11px] text-slate-400 transition">
                        Clear / Reset Fields
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                
                <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 space-y-2">
                    <label class="block text-[10px] uppercase font-bold tracking-wider text-slate-400">Filter Matrix View States</label>
                    <div class="flex flex-wrap gap-2 text-xs">
                        <button onclick="setActiveFilter('ALL')" id="filter_ALL" class="px-3 py-1.5 rounded-lg border font-semibold bg-blue-600 border-blue-500 text-white transition shadow-sm">All Assets</button>
                        <button onclick="setActiveFilter('ACTIVE')" id="filter_ACTIVE" class="px-3 py-1.5 rounded-lg border font-semibold bg-slate-800 border-slate-700 text-slate-300 transition">Active (In Scope)</button>
                        <button onclick="setActiveFilter('CAL')" id="filter_CAL" class="px-3 py-1.5 rounded-lg border font-semibold bg-slate-800 border-slate-700 text-slate-300 transition">Away for Cal</button>
                        <button onclick="setActiveFilter('RETIRED')" id="filter_RETIRED" class="px-3 py-1.5 rounded-lg border font-semibold bg-slate-800 border-slate-700 text-slate-300 transition">Decommissioned</button>
                        <button onclick="setActiveFilter('OUT')" id="filter_OUT" class="px-3 py-1.5 rounded-lg border font-semibold bg-slate-800 border-slate-700 text-slate-300 transition">Signed Out 📤</button>
                        <button onclick="setActiveFilter('STORES')" id="filter_STORES" class="px-3 py-1.5 rounded-lg border font-semibold bg-slate-800 border-slate-700 text-slate-300 transition">In Stores 📥</button>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-xl border border-slate-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs text-slate-300">
                            <thead class="bg-slate-950 uppercase font-semibold text-slate-400 text-[10px] tracking-wider border-b border-slate-800">
                                <tr>
                                    <th class="p-3">ID</th>
                                    <th class="p-3">Description</th>
                                    <th class="p-3">Location</th>
                                    <th class="p-3">Lifecycle</th>
                                    <th class="p-3">Possession Tracker / Log Context</th>
                                    <th class="p-3 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTableBody" class="divide-y divide-slate-800">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://wwlefmecuoirhhwpanih.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_xDxDgMUTIRD7x5wpyuzB-A_uC_SvoM_";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let masterCachedData = [];
        let activeStatusFilter = "ALL";

        function checkAdminAuth() {
            const pass = document.getElementById("adminPassword").value;
            if(pass === "DepotAdmin123") {
                document.getElementById("loginGate").classList.add("hidden");
                document.getElementById("adminDashboard").classList.remove("hidden");
                refreshDashboardDataComplex();
            } else {
                alert("Access Denied.");
            }
        }

        function logoutAdmin() {
            document.getElementById("adminPassword").value = "";
            document.getElementById("loginGate").classList.remove("hidden");
            document.getElementById("adminDashboard").classList.add("hidden");
        }

        function setActiveFilter(filter) {
            activeStatusFilter = filter;
            
            // Re-render button visual styling metrics
            const filters = ['ALL', 'ACTIVE', 'CAL', 'RETIRED', 'OUT', 'STORES'];
            filters.forEach(f => {
                const btn = document.getElementById(`filter_${f}`);
                if (f === filter) {
                    btn.className = "px-3 py-1.5 rounded-lg border font-semibold bg-blue-600 border-blue-500 text-white transition shadow-sm";
                } else {
                    btn.className = "px-3 py-1.5 rounded-lg border font-semibold bg-slate-800 border-slate-700 text-slate-300 transition";
                }
            });

            renderDashboardTableInterface();
        }

        // UNIFIED JOIN DATA QUERY ENGINE
        async function refreshDashboardDataComplex() {
            // 1. Fetch Master Inventory
            const { data: invData, error: invErr } = await _supabase.from('tools_inventory').select('*').order('tool_id', { ascending: true });
            if (invErr) return;

            // 2. Fetch Open Checkout Ledger Logs
            const { data: logData, error: logErr } = await _supabase.from('tool_logs').select('*').is('return_timestamp', null);
            if (logErr) return;

            // 3. Construct local tracking mapping data cache arrays
            const openCheckoutsMap = {};
            if (logData) {
                logData.forEach(row => {
                    openCheckoutsMap[row.tool_id] = row;
                });
            }

            // 4. Core Relational Data Synthesis Pipeline
            masterCachedData = invData.map(item => {
                const checkedOutLog = openCheckoutsMap[item.tool_id];
                
                // Determine current real-time tracking position state values
                let livePossessionState = "IN_STORES"; 
                let possessionMetaText = "Available for Use";

                if (item.status === "OUT_FOR_CALIBRATION") {
                    livePossessionState = "AWAY_FOR_CALIBRATION";
                    possessionMetaText = "N/A - Off-Site";
                } else if (item.status === "RETIRED") {
                    livePossessionState = "DECOMMISSIONED";
                    possessionMetaText = "N/A - Service Blocked";
                } else if (checkedOutLog) {
                    livePossessionState = "SIGNED_OUT";
                    possessionMetaText = `Out on Set: ${checkedOutLog.vehicle_id} (Pay No: ${checkedOutLog.emp_id})`;
                }

                return {
                    ...item,
                    possession_state: livePossessionState,
                    possession_meta: possessionMetaText
                };
            });

            renderDashboardTableInterface();
        }

        // DYNAMIC FILTER MATRIX ENGINE
        function renderDashboardTableInterface() {
            const tbody = document.getElementById("inventoryTableBody");
            tbody.innerHTML = "";

            // Evaluate data visibility checks against filter selectors
            const filteredDataset = masterCachedData.filter(item => {
                if (activeStatusFilter === "ALL") return true;
                if (activeStatusFilter === "ACTIVE") return item.status === "ACTIVE";
                if (activeStatusFilter === "CAL") return item.status === "OUT_FOR_CALIBRATION";
                if (activeStatusFilter === "RETIRED") return item.status === "RETIRED";
                if (activeStatusFilter === "OUT") return item.possession_state === "SIGNED_OUT";
                if (activeStatusFilter === "STORES") return item.possession_state === "IN_STORES" && item.status === "ACTIVE";
                return true;
            });

            if (filteredDataset.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-slate-500 italic">No tools matching this filter criteria layout found.</td></tr>`;
                return;
            }

            filteredDataset.forEach(item => {
                // UI COLOR COORD GENERATION ALGORITHMS
                let lifecycleBadge = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                if (item.status === "OUT_FOR_CALIBRATION") lifecycleBadge = "bg-amber-500/10 text-amber-400 border-amber-500/20";
                if (item.status === "RETIRED" || item.status === "OVERDUE") lifecycleBadge = "bg-red-500/10 text-red-400 border-red-500/20";

                let possessionBadge = "bg-emerald-950/40 text-emerald-400 border-emerald-900/50";
                if (item.possession_state === "SIGNED_OUT") {
                    possessionBadge = "bg-indigo-500/10 text-indigo-400 border-indigo-500/20 font-semibold";
                } else if (item.possession_state === "AWAY_FOR_CALIBRATION" || item.possession_state === "DECOMMISSIONED") {
                    possessionBadge = "bg-slate-800/40 text-slate-500 border-slate-700/30 italic";
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-800/40 transition-colors">
                        <td class="p-3 font-bold text-white tracking-wide">${item.tool_id}</td>
                        <td class="p-3"><p class="font-medium text-slate-200">${item.tool_name}</p><p class="text-[10px] text-slate-500">Cal Due: ${item.cal_due}</p></td>
                        <td class="p-3 text-slate-400 font-medium">${item.storage_bin}</td>
                        <td class="p-3">
                            <span class="px-2 py-0.5 border rounded-full text-[10px] font-medium tracking-wide ${lifecycleBadge}">${item.status}</span>
                        </td>
                        <td class="p-3">
                            <div class="px-2.5 py-1 border rounded-lg text-[11px] ${possessionBadge}">
                                ${item.possession_meta}
                            </div>
                        </td>
                        <td class="p-3 flex justify-center gap-2">
                            <button onclick="populateFormForEdit('${item.tool_id}', '${item.tool_name}', '${item.cal_date}', '${item.cal_due}', '${item.storage_bin}', '${item.status}')" class="text-blue-400 hover:text-blue-300 transition underline font-medium">Edit</button>
                            <button onclick="deleteTool('${item.tool_id}')" class="text-red-400 hover:text-red-300 transition honesty check window template user validation rule prompt link underline font-medium">Del</button>
                        </td>
                    </tr>`;
            });
        }

        function populateFormForEdit(id, name, calD, calDue, bin, status) {
            document.getElementById("toolId").value = id;
            document.getElementById("toolName").value = name;
            document.getElementById("calDate").value = calD;
            document.getElementById("calDue").value = calDue;
            document.getElementById("storageBin").value = bin;
            document.getElementById("toolStatus").value = status;
            
            document.getElementById("toolId").disabled = true;
            document.getElementById("formHeader").innerText = `Edit Tool: ${id}`;
        }

        function resetForm() {
            document.getElementById("toolId").value = ""; document.getElementById("toolId").disabled = false;
            document.getElementById("toolName").value = ""; document.getElementById("calDate").value = "";
            document.getElementById("calDue").value = ""; document.getElementById("storageBin").value = "";
            document.getElementById("toolStatus").value = "ACTIVE";
            document.getElementById("formHeader").innerText = "Add / Edit Inventory Item";
        }

        async function saveToolToInventory() {
            const id = document.getElementById("toolId").value.trim();
            const name = document.getElementById("toolName").value.trim();
            const calD = document.getElementById("calDate").value.trim();
            const calDue = document.getElementById("calDue").value.trim();
            const bin = document.getElementById("storageBin").value.trim();
            const status = document.getElementById("toolStatus").value;

            if(!id || !name || !calD || !calDue || !bin) return alert("All fields required.");

            const { error } = await _supabase.from('tools_inventory').upsert([{
                tool_id: id,
                tool_name: name,
                cal_date: calD,
                cal_due: calDue,
                storage_bin: bin,
                status: status
            }]);

            if (error) {
                alert("Database synchronization fault: " + error.message);
            } else {
                resetForm();
                refreshDashboardDataComplex();
            }
        }

        async function deleteTool(id) {
            if(confirm(`Purge tool code entry parameters "${id}" from matrix arrays completely?`)) {
                const { error } = await _supabase.from('tools_inventory').delete().eq('tool_id', id);
                if (error) alert(error.message);
                else refreshDashboardDataComplex();
            }
        }
    </script>
</body>
</html>
