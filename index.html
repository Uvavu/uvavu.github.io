<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storeroom Tool Tracking Prototype (ScotRail Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 flex flex-col items-center">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-xl border border-slate-700 p-6 space-y-6">
        
        <div class="flex justify-between items-center border-b border-slate-700 pb-4">
            <h1 class="text-xl font-bold tracking-tight">🛠️ Tool Center (ScotRail Prototype)</h1>
        </div>

        <div id="errorBanner" class="hidden bg-red-500/10 border border-red-500/40 rounded-xl p-4 text-center space-y-2">
            <p class="text-red-400 font-bold text-sm flex items-center justify-center gap-2">
                ⚠️ Duplicate Warning
            </p>
            <p id="errorMessageText" class="text-xs text-slate-300"></p>
        </div>

        <div id="registrationCard" class="hidden bg-slate-850 p-4 rounded-xl border border-blue-500/30 space-y-4">
            <h2 class="text-md font-semibold text-blue-400">First-Time Device Setup</h2>
            <div class="space-y-3 text-sm">
                <div>
                    <label class="block text-slate-400 font-medium mb-1">ScotRail Pay Number</label>
                    <input type="text" id="inputEmpId" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. SRXXXX">
                </div>
                <div>
                    <label class="block text-slate-400 font-medium mb-1">Full Name</label>
                    <input type="text" id="inputFullName" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none focus:border-blue-500" placeholder="e.g. John Doe">
                </div>
                <button onclick="saveRegistrationData()" class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-2.5 rounded-lg transition shadow-lg">
                    Register Device
                </button>
            </div>
        </div>

        <div id="dashboardCard" class="hidden space-y-6">
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 flex justify-between items-center text-xs">
                <div>
                    <span class="text-slate-400">User: </span>
                    <span id="userBadge" class="font-bold text-slate-200"></span>
                </div>
                <button onclick="clearRegistrationData()" class="text-red-400 hover:underline">Log Out</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="modeBookOut" onclick="setMode('BOOKOUT')" class="p-3 rounded-xl border font-bold text-sm text-center bg-slate-700 border-slate-600 text-slate-300 transition">
                    📤 Book Out
                </button>
                <button id="modeReturn" onclick="setMode('RETURN')" class="p-3 rounded-xl border font-bold text-sm text-center bg-slate-700 border-slate-600 text-slate-300 transition">
                    📥 Return
                </button>
            </div>

            <div id="workflowWorkspace" class="hidden bg-slate-900 p-4 rounded-xl border border-slate-700 space-y-4">
                
                <div id="vehicleContextArea" class="hidden space-y-2">
                    <label class="block text-xs text-slate-400 font-medium mb-1">Vehicle/Set Number</label>
                    <div class="flex gap-2">
                        <input type="text" id="inputVehicle" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg p-2 text-white focus:outline-none focus:border-emerald-500 text-sm" placeholder="e.g. 170414, 43030 etc">
                        <button id="btnConfirmVehicle" onclick="confirmVehicleID()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 rounded-lg transition">
                            OK
                        </button>
                    </div>
                </div>

                <div id="counterVerificationNotice" class="hidden p-2.5 bg-amber-500/10 border border-amber-500/30 rounded-lg text-xs text-amber-400 text-center font-medium">
                    ⚠️ Verification Required: Scan the Store Counter QR Code first.
                </div>

                <div id="scannerInterfaceArea" class="hidden space-y-3">
                    <div class="flex justify-between items-center text-xs text-slate-400">
                        <span id="scannerRoleLabel" class="font-medium">Scanner Status</span>
                        <span id="counterVerificationStatusBadge" class="hidden text-emerald-400 font-bold">✓ Counter Verified</span>
                    </div>
                    
                    <div id="scannerWindow" class="w-full bg-black rounded-xl overflow-hidden border border-slate-700 min-h-[150px] flex items-center justify-center text-xs text-slate-500 italic">
                        Camera inactive
                    </div>

                    <div id="postScanActionArea" class="hidden py-2 text-center space-y-3">
                        <p id="promptText" class="text-xs text-emerald-400 font-medium"></p>
                        <button onclick="resetScannerForNextItem()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-lg text-sm transition shadow-md flex items-center justify-center gap-2">
                            ➕ Add Another Item
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Your Current Tools</h3>
                <div id="userToolsList" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://wwlefmecuoirhhwpanih.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_xDxDgMUTIRD7x5wpyuzB-A_uC_SvoM_";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let qrScannerInstance = null;
        let activeSystemMode = null; 
        let isCounterProximityVerified = false;

        window.onload = function() { 
            evaluateUserAuthenticationState();
        };

        function playScannerBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.12); 
            } catch (e) {
                console.error("Audio context couldn't initialize:", e);
            }
        }

        // Distinct, lower error buzz sound for duplicate alerts
        function playErrorBuzz() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sawtooth'; // Rough sound type
                oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); // Low buzz frequency
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); 
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3); // Longer buzz
            } catch (e) {
                console.error("Audio context error:", e);
            }
        }

        function hideError() {
            document.getElementById("errorBanner").classList.add("hidden");
        }

        function showWarningBanner(msg) {
            playErrorBuzz();
            document.getElementById("errorMessageText").innerText = msg;
            document.getElementById("errorBanner").classList.remove("hidden");
        }

        function evaluateUserAuthenticationState() {
            const empId = localStorage.getItem("logistics_empId");
            const fullName = localStorage.getItem("logistics_fullName");
            
            if (empId && fullName) {
                document.getElementById("registrationCard").classList.add("hidden");
                document.getElementById("dashboardCard").classList.remove("hidden");
                document.getElementById("userBadge").innerText = `${fullName} (${empId})`;
                synchronizeUserAssignedItems();
            } else {
                document.getElementById("registrationCard").classList.remove("hidden");
                document.getElementById("dashboardCard").classList.add("hidden");
                killScanner();
            }
        }

        function saveRegistrationData() {
            const idVal = document.getElementById("inputEmpId").value.trim();
            const nameVal = document.getElementById("inputFullName").value.trim();
            if(!idVal || !nameVal) return alert("Please fill out all fields.");
            
            localStorage.setItem("logistics_empId", idVal);
            localStorage.setItem("logistics_fullName", nameVal);
            evaluateUserAuthenticationState();
        }

        function clearRegistrationData() {
            if(confirm("Log out of this device?")) {
                localStorage.clear();
                location.reload();
            }
        }

        async function synchronizeUserAssignedItems() {
            const empId = localStorage.getItem("logistics_empId");
            const { data, error } = await _supabase.from('tool_logs').select('*').eq('emp_id', empId);
            if (error) return;

            const history = data || [];
            const activeToolsMap = {};
            history.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

            history.forEach(log => {
                if (log.action_type === 'BOOKOUT') {
                    activeToolsMap[log.tool_id] = { vehicle: log.vehicle_id, calDue: log.cal_due };
                } else if (log.action_type === 'RETURN') {
                    delete activeToolsMap[log.tool_id]; 
                }
            });

            const listContainer = document.getElementById("userToolsList");
            listContainer.innerHTML = "";
            const activeToolIds = Object.keys(activeToolsMap);

            if(activeToolIds.length > 0) {
                activeToolIds.forEach(id => {
                    listContainer.innerHTML += `
                        <div class="bg-slate-900 p-2.5 rounded-lg border border-slate-800 flex justify-between items-center text-xs">
                            <div><p class="font-bold text-slate-200">${id}</p><p class="text-[10px] text-slate-500">Set: ${activeToolsMap[id].vehicle} | Calibration Due: ${activeToolsMap[id].calDue}</p></div>
                            <span class="px-2 py-0.5 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded-full text-[10px]">Out</span>
                        </div>`;
                });
            } else {
                listContainer.innerHTML = `<p class="text-xs text-slate-500 text-center py-2 italic">No assets checked out.</p>`;
            }
        }

        function setMode(mode) {
            activeSystemMode = mode;
            isCounterProximityVerified = false;
            killScanner();
            hideError();

            document.getElementById("modeBookOut").className = mode === 'BOOKOUT' ? "p-3 rounded-xl border font-bold text-sm text-center bg-emerald-600 border-emerald-500 text-white" : "p-3 rounded-xl border font-bold text-sm text-center bg-slate-700 border-slate-600 text-slate-300";
            document.getElementById("modeReturn").className = mode === 'RETURN' ? "p-3 rounded-xl border font-bold text-sm text-center bg-amber-600 border-amber-500 text-white" : "p-3 rounded-xl border font-bold text-sm text-center bg-slate-700 border-slate-600 text-slate-300";
            
            document.getElementById("workflowWorkspace").classList.remove("hidden");
            document.getElementById("counterVerificationStatusBadge").classList.add("hidden");
            document.getElementById("postScanActionArea").classList.add("hidden");

            if (mode === 'BOOKOUT') {
                document.getElementById("vehicleContextArea").classList.remove("hidden");
                document.getElementById("inputVehicle").disabled = false;
                document.getElementById("btnConfirmVehicle").classList.remove("hidden");
                document.getElementById("counterVerificationNotice").classList.add("hidden");
                document.getElementById("scannerInterfaceArea").classList.add("hidden");
                document.getElementById("scannerRoleLabel").innerText = "Scan Tool Data QR Code";
            } else {
                document.getElementById("vehicleContextArea").classList.add("hidden");
                document.getElementById("counterVerificationNotice").classList.remove("hidden");
                document.getElementById("scannerInterfaceArea").classList.remove("hidden");
                document.getElementById("scannerRoleLabel").innerText = "Scan Counter Verification QR";
                initiateScannerUI();
            }
        }

        function confirmVehicleID() {
            const vehicleId = document.getElementById("inputVehicle").value.trim();
            if(!vehicleId) return alert("Please enter a valid Vehicle/Set Number first.");

            document.getElementById("inputVehicle").disabled = true;
            document.getElementById("btnConfirmVehicle").classList.add("hidden");
            document.getElementById("scannerInterfaceArea").classList.remove("hidden");
            initiateScannerUI();
        }

        async function initiateScannerUI() {
            await killScanner();
            hideError();
            document.getElementById("scannerWindow").innerHTML = "";
            document.getElementById("postScanActionArea").classList.add("hidden");

            qrScannerInstance = new Html5Qrcode("scannerWindow");

            setTimeout(() => {
                qrScannerInstance.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: 230 },
                    (decodedText) => { processInboundScannedPayload(decodedText); },
                    () => {}
                ).catch((err) => {
                    console.error("Camera hardware init failed:", err);
                });
            }, 300);
        }

        async function killScanner() {
            if (qrScannerInstance && qrScannerInstance.isScanning) {
                await qrScannerInstance.stop();
            }
            qrScannerInstance = null;
        }

        function resetScannerForNextItem() {
            document.getElementById("postScanActionArea").classList.add("hidden");
            initiateScannerUI();
        }

        async function processInboundScannedPayload(decodedText) {
            const parts = decodedText.split('|');
            const toolId = parts[0];

            if (activeSystemMode === 'BOOKOUT') {
                if(parts.length < 3) {
                    playErrorBuzz();
                    alert("Format mismatch detected! QR code data is invalid.");
                    return;
                }

                await killScanner();
                document.getElementById("scannerWindow").innerText = "Checking inventory state...";

                // ACTIVE CHECK: Look up the total history of this tool globally
                const { data, error } = await _supabase
                    .from('tool_logs')
                    .select('*')
                    .eq('tool_id', toolId);

                if (!error && data && data.length > 0) {
                    // Sort locally to find the absolute newest transaction status
                    data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                    const latestLog = data[data.length - 1];

                    // If it's already BOOKOUT, stop the sequence and flash error!
                    if (latestLog.action_type === 'BOOKOUT') {
                        document.getElementById("scannerWindow").innerText = "Transaction Blocked.";
                        showWarningBanner(`"${toolId}" is already checked out to Pay Number ${latestLog.emp_id}. It must be returned first. Would you like to add a different piece of equipment?`);
                        document.getElementById("promptText").innerText = "";
                        document.getElementById("postScanActionArea").classList.remove("hidden");
                        return;
                    }
                }

                // If code execution hits this point, the tool is clean to book out!
                playScannerBeep();
                document.getElementById("scannerWindow").innerText = "Transmitting log updates...";

                await writeLogToDatabase({
                    action_type: "BOOKOUT",
                    emp_id: localStorage.getItem("logistics_empId"),
                    full_name: localStorage.getItem("logistics_fullName"),
                    vehicle_id: document.getElementById("inputVehicle").value.trim(),
                    tool_id: toolId,
                    cal_date: parts[1], 
                    cal_due: parts[2]   
                });

                document.getElementById("promptText").innerText = `Successfully booked out ${toolId}.`;
                document.getElementById("postScanActionArea").classList.remove("hidden");

            } else if (activeSystemMode === 'RETURN') {
                if (!isCounterProximityVerified) {
                    if (decodedText.trim() === "STORE_ROOM_COUNTER_VERIFIED") {
                        playScannerBeep();
                        await killScanner(); 
                        isCounterProximityVerified = true;
                        document.getElementById("counterVerificationNotice").classList.add("hidden");
                        document.getElementById("counterVerificationStatusBadge").classList.remove("hidden");
                        document.getElementById("scannerRoleLabel").innerText = "Scan Tool QR Code to Complete Return";
                        initiateScannerUI();
                    } else {
                        showWarningBanner("Verification step rejected. You must scan the counter layout marker first.");
                    }
                } else {
                    await killScanner();
                    document.getElementById("scannerWindow").innerText = "Validating ownership parameters...";

                    // Check if anyone even has this checked out before running return
                    const { data, error } = await _supabase.from('tool_logs').select('*').eq('tool_id', toolId);
                    if (!error && data) {
                        data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                        const latest = data[data.length - 1];

                        if (!latest || latest.action_type === 'RETURN') {
                            document.getElementById("scannerWindow").innerText = "Return halted.";
                            showWarningBanner(`"${toolId}" is already registered inside stores. No open checkout record exists.`);
                            document.getElementById("promptText").innerText = "";
                            document.getElementById("postScanActionArea").classList.remove("hidden");
                            return;
                        }
                    }

                    playScannerBeep();
                    document.getElementById("scannerWindow").innerText = "Processing closure logs...";

                    await writeLogToDatabase({
                        action_type: "RETURN",
                        emp_id: localStorage.getItem("logistics_empId"),
                        full_name: localStorage.getItem("logistics_fullName"),
                        vehicle_id: "",
                        tool_id: toolId,
                        cal_date: parts[1] || "",
                        cal_due: parts[2] || ""
                    });

                    document.getElementById("promptText").innerText = `Successfully returned ${toolId}.`;
                    document.getElementById("postScanActionArea").classList.remove("hidden");
                }
            }
        }

        async function writeLogToDatabase(payload) {
    // 1. Calculate the exact UK time including BST offsets dynamically
    const now = new Date();
    const tzOffsetMs = now.getTimezoneOffset() * 60000; // Get difference from UTC in milliseconds
    const localISOTime = new Date(now.getTime() - tzOffsetMs).toISOString(); // Shift time vector
    
    // 2. Format it into clean UK display standards: DD/MM/YYYY HH:MM:SS
    const ukDate = now.toLocaleDateString('en-GB'); 
    const ukTime = now.toLocaleTimeString('en-GB', { hour12: false });
    const formattedUKTimestamp = `${ukDate} ${ukTime}`;

    // 3. Append the precise UK timestamp to the payload packet
    // Note: We use 'created_at' explicitly to override the database default UTC stamp
    const completePayload = {
        ...payload,
        created_at: localISOTime 
    };

    const { error } = await _supabase.from('tool_logs').insert([completePayload]);

    if (error) {
        alert("Cloud transmission fault: " + error.message);
        document.getElementById("postScanActionArea").classList.remove("hidden");
    } else {
        // Update the user's active tool list on-screen
        synchronizeUserAssignedItems();
    }
}
    </script>
</body>
</html>
